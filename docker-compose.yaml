services:
  overseer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: overseer-app
    ports:
      - "3000:3000"
    environment:
      - DEMO=true
      - DATABASE_URL=postgresql://postgres:password@localhost:5432/overseer
      - SESSION_SECRET=your-very-long-random-secret-at-least-32-characters
      - ALLOWED_ORIGINS=localhost:3000,overseerdemo.el4s.dev
    restart: unless-stopped
